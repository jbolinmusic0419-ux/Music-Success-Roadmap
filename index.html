<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Music Success Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: #333;
  }

  .container {
    background: #fff;
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
  }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: 28px;
    margin-bottom: 15px;
  }

  p {
    font-size: 16px;
    color: #555;
    margin-bottom: 25px;
  }

  input[type="email"] {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(90deg, #ff758c, #ff7eb3);
    color: white;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  button:hover {
    transform: scale(1.05);
  }

</style>
</head>
<body>

<div class="container">
  <h1>🎵 Free Music Success Roadmap</h1>
  <p>Enter your email and get the PDF roadmap to go from beginner to music career.</p>

  <!-- Simple form that submits directly to Google Apps Script -->
  <form method="POST" action="https://script.google.com/macros/s/AKfycbwckYra9QkXklzC62vN7ftqA9zV-Sygzdld54p6oAsqMtgxKC5vVe_rsu3LuCfb124N/exec">
    <input type="email" name="email" placeholder="Your email" required>
    <button type="submit">Send Me the PDF</button>
  </form>
</div>

</body>
</html>
